name: AUR Package Compiler

on:
#  schedule:
    # Runs every day at midnight to check for updates
 #   - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows on-demand terminal execution via 'gh workflow run'
    inputs:
      package_name:
        description: 'Specific AUR package to build on-demand'
        required: false
        default: 'gtk2'

jobs:
  build-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Package inside Arch Linux Container
        run: |
          # Define the target package
          export TARGET_PKG="${{ github.event.inputs.package_name || 'gtk2' }}"
          echo "Target package set to: $TARGET_PKG"
          
          # 1. Use -e TARGET_PKG="$TARGET_PKG" to pass the variable into Docker
          # 2. Swap to single quotes for the outer docker bash command to avoid premature expansion
          docker run --rm -e TARGET_PKG="$TARGET_PKG" -v ${{ github.workspace }}:/workspace archlinux:base /bin/bash -c '
            # Update system and install base development tools
            pacman -Syu --noconfirm base-devel git sudo

            # Create a generic builder user
            useradd -m builder
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chmod -R a+rw /workspace
            
            # Switch to the non-root user context
            # Use -E with sudo to pass the TARGET_PKG environment variable down to the builder user
            sudo -u builder -E bash -c "
              cd /workspace
              git clone https://aur.archlinux.org/${TARGET_PKG}.git
              cd ${TARGET_PKG}
              
              # Download dependencies, compile code, and package without prompting
              makepkg -s --noconfirm
            "
          '
          "

      - name: Upload Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name || 'gtk2' }}-binary-package
          path: |
            **/*.pkg.tar.zst
